<script>
// رابط السيرفر الوسيط (غيّره بعد الرفع)
const BACKEND_URL = "http://localhost:3000";

document.getElementById('downloadBtn').addEventListener('click', async () => {
    const urlInput = document.querySelector('input[type="text"]').value.trim();
    if (!urlInput) return alert("الرجاء لصق الرابط");

    const activeBtn = document.querySelector('.quality button.active');
    const quality = activeBtn ? activeBtn.getAttribute('data-q') : '720';

    // عرض تحميل
    const originalText = document.getElementById('downloadBtn').innerHTML;
    document.getElementById('downloadBtn').innerHTML = 'جاري التحميل...';
    document.getElementById('downloadBtn').disabled = true;

    try {
        const res = await fetch(`${BACKEND_URL}/api/download`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url: urlInput, quality: quality })
        });

        const data = await res.json();

        if (data.status === 'tunnel' || data.status === 'redirect') {
            const a = document.createElement('a');
            a.href = data.url;
            a.download = data.filename || 'video.mp4';
            a.click();
        } else if (data.error) {
            alert("خطأ: " + (data.error.code || 'حدث خطأ غير متوقع'));
        }
    } catch (e) {
        alert("فشل الاتصال بالسيرفر");
    } finally {
        // إعادة الزر
        document.getElementById('downloadBtn').innerHTML = originalText;
        document.getElementById('downloadBtn').disabled = false;
    }
});
</script>
